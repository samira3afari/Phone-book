
<!DOCTYPE html>
<html>
<head>
    <title>دفترچه تلفن</title>
    <style>
        body { font-family: tahoma; text-align: center; margin-top: 50px; background: lightblue; }
        input, button { padding: 8px; margin: 5px; }
        .msg { color: green; font-weight: bold; }
        a { display: inline-block; margin-top: 20px; padding: 8px 16px; background: orange; color: black; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>افزودن مخاطب جدید</h2>
    <form action="/add" method="post">
        <input type="text" name="name" placeholder="نام" required>
        <br>
        <input type="text" name="phone" placeholder="شماره تلفن" required>
        <br>
        <button type="submit">ذخیره</button>
    </form>
    {% if message %}
        <p class="msg">{{ message }}</p>
    {% endif %}
    <br>
    <a href="/list">مشاهده لیست مخاطبان</a>
</body>
</html>
